<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; media-src file: 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline';" />
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Library: folder browser + column table -->
      <aside id="library">
        <div class="lib-head">
          <h1 class="neon">&#9835; music &#9835;</h1>
          <div class="nav-row">
            <button id="up-btn" title="Up one folder">&#8593;</button>
            <div id="crumbs" class="crumbs"></div>
          </div>
          <div class="lib-tools">
            <input id="search" type="search" placeholder="Search title / artist / album…" />
            <button id="lib-shuffle" title="Shuffle the track view for inspiration (folders stay ordered)">&#128256;</button>
            <button id="pick-dir" title="Open a folder">Open&hellip;</button>
          </div>
        </div>
        <div id="lib-head-row" class="table-head"></div>
        <ul id="entry-list"></ul>
        <p id="lib-status" class="muted"></p>
      </aside>

      <!-- Stage: the visualizer with now-playing, queue and history -->
      <main id="stage">
        <div id="viz-bar">
          <div id="viz-buttons"></div>
          <div class="np">
            <img id="np-art" alt="" />
            <span id="now-playing" class="muted"></span>
          </div>
          <button id="skin-toggle" title="Change skin">&#127912; Skin</button>
          <button id="queue-toggle" title="Show queue">Queue (0)</button>
          <button id="history-toggle" title="Show track history">History (0)</button>
        </div>

        <div id="canvas-wrap">
          <canvas id="viz-canvas"></canvas>
          <div id="now-playing-banner"><span class="np-label">Currently playing:</span> <span id="np-banner-track" class="np-track">Nothing yet — pick a track</span></div>
          <aside id="queue-panel" class="hidden">
            <div class="queue-head"><strong>Queue</strong><button id="queue-clear" class="ghost">Clear</button></div>
            <div class="suggest">
              <div class="suggest-head">&#128161; Suggested next <span class="muted">(harmonic + popular)</span></div>
              <ul id="suggest-list"></ul>
            </div>
            <ul id="queue-list"></ul>
          </aside>
          <aside id="history-panel" class="hidden">
            <div class="queue-head"><strong>Track History</strong><button id="history-clear" class="ghost">Clear</button></div>
            <ul id="history-list"></ul>
          </aside>
        </div>

        <div id="controls">
          <!-- Winamp-style LCD display: status + time + mini visualizer + scrolling
               title + bitrate/khz/stereo readouts -->
          <div id="player-lcd">
            <div class="lcd-left">
              <span id="lcd-status" class="lcd-status" title="Playback state">&#9209;</span>
              <span id="cur-time" class="lcd-time" title="Click to toggle elapsed / remaining">0:00</span>
            </div>
            <canvas id="mini-vis" title="Spectrum analyzer"></canvas>
            <div class="lcd-main">
              <div class="lcd-marquee"><span id="marquee-text">&#9835; music player &#9835;</span></div>
              <div class="lcd-info">
                <span id="info-kbps">--</span><span class="lcd-unit">kbps</span>
                <span class="lcd-dot">&middot;</span>
                <span id="info-khz">--</span><span class="lcd-unit">kHz</span>
                <span class="lcd-dot">&middot;</span>
                <span id="info-chan" class="lcd-chan">--</span>
              </div>
            </div>
          </div>

          <div class="transport-row">
            <div class="transport">
              <button id="prev" title="Previous">&#9198;</button>
              <button id="play" title="Play / Pause">&#9654;</button>
              <button id="stop" title="Stop">&#9209;</button>
              <button id="next" title="Next">&#9197;</button>
              <button id="shuffle" title="Harmonic shuffle this folder">&#128256;</button>
            </div>
            <div class="seek">
              <input id="seek-bar" type="range" min="0" max="1000" value="0" step="1" />
              <span id="tot-time" class="time">0:00</span>
            </div>
            <div class="volume">
              <span title="Master volume">&#128266;</span>
              <input id="volume" type="range" min="0" max="1" value="0.9" step="0.01" />
            </div>
          </div>
        </div>
      </main>
    </div>

    <canvas id="overlay"></canvas>
    <div id="drop-hint">Drop a folder to browse it &middot; drop files to play them</div>

    <script type="module" src="app.js"></script>
  </body>
</html>
